<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>In‑Silico Tissue Interaction Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="container">
    <canvas id="simCanvas"></canvas>

    <div id="controls">
      <h2>Phenotype Selection</h2>
      <select id="cellType">
        <option value="stem">Stem Cell</option>
        <option value="neural_stem">Neural Stem Cell</option>
        <option value="mesenchymal">Mesenchymal Stem Cell</option>

        <option value="neuron">Neuron</option>
        <option value="astrocyte">Astrocyte</option>
        <option value="microglia">Microglia</option>
        <option value="oligodendrocyte">Oligodendrocyte</option>

        <option value="cancer">Cancer Cell</option>
        <option value="glioblastoma">Glioblastoma Cell</option>

        <option value="immune">Generic Immune Cell</option>
        <option value="tcell">T Cell</option>
        <option value="macrophage">Macrophage</option>
        <option value="dendritic">Dendritic Cell</option>

        <option value="fibro">Fibroblast</option>
        <option value="epithelial">Epithelial Cell</option>
        <option value="endothelial">Endothelial Cell</option>
        <option value="muscle">Muscle Cell</option>

        <option value="hepatocyte">Hepatocyte</option>
        <option value="cardiomyocyte">Cardiomyocyte</option>
        <option value="pancreatic_beta">Pancreatic Beta Cell</option>
      </select>

      <h2>Simulation Parameters</h2>
      <label>Diffusion Coefficient
        <input type="range" id="diffusion" min="0.01" max="1" step="0.01" value="0.2" />
      </label>
      <label>Decay Rate
        <input type="range" id="decay" min="0" max="0.2" step="0.005" value="0.01" />
      </label>

      <button id="playBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <script src="cells.js"></script>
  <script src="simulation.js"></script>
  <script src="ui.js"></script>
</body>
</html>
